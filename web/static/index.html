<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TRPG2SKILL</title>
<link rel="stylesheet" href="/style.css">
<link rel="stylesheet" href="/themes/dark.css" id="theme-link">
</head>
<body>

<!-- Top Bar -->
<header id="topbar">
  <span class="logo">★ TRPG2SKILL</span>
  <button class="tab-btn active" data-tab="compile">编译</button>
  <button class="tab-btn" data-tab="play">游戏</button>
  <button class="tab-btn" data-tab="settings">设置</button>
  <span class="top-actions">
    <button class="btn-icon" id="btn-left-drawer" onclick="toggleLeftDrawer()">◧</button>
    <button class="btn-icon" id="save-btn-top" onclick="toggleSavePanel()" style="display:none">💾</button>
    <button class="btn-icon" id="btn-right-drawer" onclick="toggleRightDrawer()">◨</button>
    <button class="btn-icon btn-danger" onclick="shutdownServer()">⏻</button>
  </span>
</header>

<!-- Main Area -->
<div id="main-area">

  <!-- ── Left Drawer: Game List ── -->
  <div id="left-drawer">
    <div style="display:flex;align-items:center;gap:8px;padding:8px">
      <h3 style="font-size:15px;margin:0">游戏列表</h3>
      <button class="btn-icon" id="toggle-hidden-btn" onclick="toggleHiddenSkills()" style="margin-left:auto;font-size:11px;padding:3px 8px;display:none">显示隐藏</button>
    </div>
    <div id="game-list" style="flex:1;overflow-y:auto;padding:0 8px"></div>
    <div style="padding:8px;border-top:1px solid var(--border)">
      <input id="game-dir-input" placeholder="自定义路径..." style="width:100%;padding:6px 8px;background:var(--panel-bg);color:var(--text);border:1px solid var(--border);border-radius:4px;font-size:11px;margin-bottom:4px">
      <div style="display:flex;gap:4px">
        <button class="btn-icon" onclick="loadGameByPath(document.getElementById('game-dir-input').value.trim())" style="flex:1;font-size:11px;padding:3px">加载</button>
        <button class="btn-icon" onclick="scanCustomDir()" style="flex:1;font-size:11px;padding:3px">扫描</button>
      </div>
    </div>
  </div>

  <!-- ── Center Panel ── -->
  <div id="center-panel">

    <!-- Compile Tab -->
    <div id="compile-tab" class="tab-content active">
      <textarea id="compile-input" placeholder="在此粘贴世界书/剧本内容...&#10;或拖拽文件到此处"></textarea>
      <div style="display:flex;gap:8px;align-items:center;flex-wrap:wrap">
        <input type="file" id="compile-file-input" accept=".txt,.md" onchange="loadFile()" title="上传世界书文件" aria-label="上传世界书文件" style="display:none">
        <button class="btn-icon" onclick="document.getElementById('compile-file-input').click()">📁 上传文件</button>
        <input id="compile-name" placeholder="游戏名称 (可选)" style="width:200px">
        <button id="compile-submit" onclick="startCompile()">开始编译</button>
      </div>
      <div id="progress-bar-wrap" style="display:none"><div id="progress-bar"></div></div>
      <div id="progress-text"></div>
      <div id="compile-result">
        <div class="result-text"></div>
        <button class="btn-icon" onclick="loadCompiledGame()" style="display:none;margin-top:8px" id="btn-play-compiled">开始游戏</button>
        <div id="compile-review" style="display:none;margin-top:12px">
          <div class="settings-section">
            <h3>审核编译结果</h3>
            <div id="review-detail" style="font-size:13px;line-height:1.6"></div>
            <div style="margin-top:10px;display:flex;gap:6px;flex-wrap:wrap">
              <button class="btn-icon" onclick="openEditPanel('bans')" style="font-size:12px;padding:4px 10px">编辑禁令</button>
              <button class="btn-icon" onclick="openEditPanel('lorebook')" style="font-size:12px;padding:4px 10px">编辑Lorebook</button>
              <button class="btn-icon" onclick="openEditPanel('toolpool')" style="font-size:12px;padding:4px 10px">数据池</button>
              <button class="btn-icon" onclick="smartDedupBans()" style="font-size:12px;padding:4px 10px">智能去重</button>
            </div>
          </div>
          <textarea id="review-feedback" placeholder="修正意见..." style="width:100%;min-height:60px;padding:8px;background:var(--panel-bg);color:var(--text);border:1px solid var(--border);border-radius:6px;font-size:13px;resize:vertical"></textarea>
          <div style="display:flex;gap:6px;margin-top:6px;flex-wrap:wrap">
            <button class="btn-icon" onclick="recompileWithFeedback()">根据意见重新编译</button>
            <button class="btn-icon" onclick="recompileSinglePhase(1)" style="font-size:12px;padding:4px 10px">重编译实体</button>
            <button class="btn-icon" onclick="recompileSinglePhase(2)" style="font-size:12px;padding:4px 10px">重编译规则</button>
            <button class="btn-icon" onclick="recompileSinglePhase(3)" style="font-size:12px;padding:4px 10px">重编译结构</button>
            <button class="btn-icon" onclick="recompileSinglePhase(4)" style="font-size:12px;padding:4px 10px">重编译工具</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Play Tab -->
    <div id="play-tab" class="tab-content">
      <div id="play-load" style="flex:1;display:flex;align-items:center;justify-content:center;color:var(--text2)">
        从左侧游戏列表选择游戏，或点击 ◧ 展开列表
      </div>
      <div id="play-active" style="display:none;flex:1;flex-direction:column">
        <div id="play-header">
          <span class="game-name" id="game-name-display"></span>
          <span class="game-info" id="game-info-display"></span>
        </div>
        <div id="narrative-area"></div>
        <div id="input-row">
          <input id="player-input" placeholder="输入行动..." onkeydown="if(event.key==='Enter')sendInput()">
          <button id="send-btn" onclick="sendInput()">发送</button>
        </div>
      </div>
    </div>

    <!-- Settings Tab -->
    <div id="settings-tab" class="tab-content">
      <div class="settings-section">
        <h3>主题</h3>
        <div id="theme-selector" style="display:flex;gap:10px;flex-wrap:wrap"></div>
      </div>
      <div class="settings-section">
        <h3>API 配置</h3>
        <div id="profile-list"></div>
        <div class="profile-form" id="profile-form">
          <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:2px">配置名</label>
          <input id="pf-name" placeholder="DeepSeek">
          <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:2px">API 地址</label>
          <input id="pf-url" placeholder="https://api.deepseek.com">
          <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:2px">API Key</label>
          <input id="pf-key" placeholder="sk-..." type="password">
          <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:2px">模型名</label>
          <input id="pf-model" placeholder="deepseek-chat">
          <label style="font-size:12px;color:var(--text2);display:block;margin-bottom:2px">分析模型 (可选)</label>
          <input id="pf-analyzer" placeholder="留空则使用模型名">


          <button onclick="saveProfile()">保存</button>
          <button class="btn-icon" onclick="testConnection()" style="margin-left:8px">测试连接</button>
          <span id="test-result" style="font-size:13px;margin-left:8px"></span>
        </div>
      </div>
      <div class="settings-section">
        <h3>游戏参数 (需加载游戏后生效)</h3>
        <div id="game-config-sliders"></div>
        <button class="btn-icon" onclick="resetGameConfig()">恢复默认</button>
      </div>
    </div>

  </div>

  <!-- ── Right Drawer: Edit Panel ── -->
  <div id="right-drawer">
    <div class="edit-tabs">
      <button class="edit-tab active" data-edit-tab="bans" onclick="switchEditTab('bans')">禁令</button>
      <button class="edit-tab" data-edit-tab="lorebook" onclick="switchEditTab('lorebook')">Lorebook</button>
      <button class="edit-tab" data-edit-tab="toolpool" onclick="switchEditTab('toolpool')">数据池</button>
      <button class="edit-tab" data-edit-tab="agents" onclick="switchEditTab('agents')">AGENTS</button>
      <button class="edit-tab" data-edit-tab="status" onclick="switchEditTab('status')">状态</button>
    </div>
    <div id="edit-content" class="edit-tab-content"></div>
    <div id="status-panel" style="display:none;flex:1;overflow-y:auto;padding:10px;font-size:13px;line-height:1.7"></div>
  </div>

</div>

<!-- Save Panel -->
<div class="panel-overlay" id="save-overlay" onclick="toggleSavePanel()"></div>
<div class="panel-drawer" id="save-drawer">
  <h3>存档管理</h3>
  <button class="btn-icon" onclick="manualSave()" style="margin-bottom:10px">💾 手动存档</button>
  <div id="save-list"></div>
</div>

<!-- Loading Overlay -->
<div id="loading-overlay"><div class="spinner"></div><span id="loading-text"></span></div>

<script src="/app.js"></script>
</body>
</html>
